<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>godfuck</title>
  <link rel="shortcut icon" href="./favicon.ico" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="stylesheet" href="./client/styles/main.css" />
</head>
<body>
  <div id="joinOverlay" class="join-overlay">
    <form id="joinForm" class="join-card">
      <h1 class="join-title">godfuck</h1>
      <p class="join-subtitle">Enter your player ID to join the server.</p>
      <input
        id="joinNameInput"
        class="join-input"
        maxlength="16"
        placeholder="player name"
        autocomplete="off"
        inputmode="latin"
      />
      <p class="join-hint">Use English letters, numbers, `_` or `-`.</p>
      <button class="join-button" type="submit">Join Game</button>
    </form>
  </div>
  <canvas id="game" width="800" height="800"></canvas>
  <div id="chatBox" class="chat-box"></div>
  <input id="chatInput" class="chat-input" />

  <script type="module" src="./client/src/main.js"></script>
</body>
</html>
